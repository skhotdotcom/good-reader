<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg3)"/>
  <g transform="translate(256, 256)">
    <!-- Bottom-right arc — purple -->
    <path d="M110,0 A110,110 0 1,0 0,110"
          fill="none" stroke="#C084FC" stroke-width="34" stroke-linecap="round"/>
    <!-- Top-left arc — yellow -->
    <path d="M0,-110 A110,110 0 0,0 -110,0"
          fill="none" stroke="#FFDA44" stroke-width="34" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="20" fill="#FFDA44"/>
    <!-- G crossbar -->
    <line x1="0" y1="110" x2="110" y2="110" stroke="#C084FC" stroke-width="34" stroke-linecap="round"/>
    <!-- Dots — right side, well spaced from the purple arc -->
    <circle cx="150" cy="-62" r="9" fill="#FFDA44"/>
    <circle cx="140" cy="-100" r="7" fill="#C084FC"/>
    <circle cx="164" cy="-132" r="5" fill="#FFDA44"/>
  </g>
</svg>